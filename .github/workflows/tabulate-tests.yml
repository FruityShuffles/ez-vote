name: Algorithm golden tests

# Guards the two client/server algorithm sources of truth against behavioral
# drift: tabulation (M2, _shared/tabulate.ts) and ballot derivation (M23,
# _shared/derive.ts). Runs both golden corpora on the same Deno runtime the
# edge function uses in production. The derivation fixtures are generated by
# the Dart oracle (tool/derive_fixtures.dart), so changes there re-validate too.

on:
  push:
    paths:
      - "supabase/functions/**"
      - "tool/**"
      - ".github/workflows/tabulate-tests.yml"
  pull_request:
    paths:
      - "supabase/functions/**"
      - "tool/**"
      - ".github/workflows/tabulate-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run algorithm golden tests
        working-directory: supabase/functions
        run: deno task test
